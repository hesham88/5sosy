<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<title>5sosy — خصوصي الذكي</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!--
  5sosy — Student web-app prototype
  ──────────────────────────────────
  Hash routes (deep-linkable for demo):
    #onboarding   → 3-step setup wizard
    #home         → Dashboard / intent input
    #session      → Smart lesson + audio + chat
    #quiz         → Adaptive diagnostic quiz
    #oral         → Mock oral exam (mic-orb)
    #progress     → Heatmap, mastery, concept graph
    #settings     → Language, TTS accent, data

  Demo path:
    #onboarding → #home → #session → #quiz → #oral → #progress
-->

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ar-font: 'Cairo', 'Tajawal', 'Inter', system-ui, sans-serif;
    --en-font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html { font-family: var(--ar-font); }
  html[lang="en"] { font-family: var(--en-font); }
  body { background:#f8fafc; color:#0f172a; }

  /* numbers always LTR */
  .num, .ltr { direction: ltr; unicode-bidi: isolate; font-variant-numeric: tabular-nums; }

  /* terminal / agent log */
  .terminal {
    background:#0f172a;
    color:#38bdf8;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
  }
  .terminal .ok   { color:#22c55e; }
  .terminal .warn { color:#f59e0b; }
  .terminal .dim  { color:#64748b; }
  .terminal .lab  { color:#a78bfa; }

  /* typewriter cursor */
  .tw-cursor::after {
    content:'▍';
    color:#38bdf8;
    margin-inline-start: 2px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* card hover lift */
  .card-lift { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
  .card-lift:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -10px rgba(15,23,42,.18); }

  /* mic orb */
  .mic-orb {
    background: radial-gradient(circle at 30% 30%, #38bdf8 0%, #0284c7 45%, #0c4a6e 100%);
    box-shadow:
      0 0 0 8px rgba(56,189,248,.08),
      0 0 0 24px rgba(56,189,248,.05),
      0 0 0 56px rgba(56,189,248,.03),
      0 30px 80px -20px rgba(2,132,199,.6);
    animation: orbPulse 2.4s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.04); filter: brightness(1.1); }
  }
  .mic-ring {
    position:absolute; inset:-40px; border-radius:9999px;
    border:1px solid rgba(56,189,248,.25);
    animation: ringOut 2.4s ease-out infinite;
  }
  .mic-ring.r2 { animation-delay: .8s; }
  .mic-ring.r3 { animation-delay: 1.6s; }
  @keyframes ringOut {
    0% { transform: scale(.6); opacity: .8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* waveform bars */
  .wave-bar {
    display:inline-block;
    width:3px; margin:0 1.5px;
    background:#0284c7; border-radius:2px;
    animation: wave 1.1s ease-in-out infinite;
  }
  @keyframes wave {
    0%,100% { height: 6px; }
    50%     { height: 26px; }
  }

  /* concept ring (weak-topic confidence) */
  .ring-svg circle.track { stroke:#e2e8f0; }
  .ring-svg circle.fill  { stroke-linecap:round; transition: stroke-dashoffset .6s ease; }

  /* heatmap cell */
  .hm0 { background:#f1f5f9; }
  .hm1 { background:#bae6fd; }
  .hm2 { background:#7dd3fc; }
  .hm3 { background:#38bdf8; }
  .hm4 { background:#0284c7; }

  /* katex-ish equation */
  .eq {
    font-family: 'Times New Roman', 'STIX Two Math', serif;
    font-style: italic;
    font-size: 1.25rem;
    letter-spacing: .02em;
  }
  .eq sub, .eq sup { font-style: normal; }

  /* logical-property helpers (Tailwind v3 has these but be safe) */
  .ms-auto { margin-inline-start:auto; }
  .me-auto { margin-inline-end:auto; }

  /* slim scroll */
  .slim::-webkit-scrollbar { height:6px; width:6px; }
  .slim::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .slim::-webkit-scrollbar-track { background:transparent; }

  /* confetti */
  .confetti {
    position:absolute; width:8px; height:14px; opacity:0;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(160px) rotate(540deg); opacity: 0; }
  }

  /* focus ring */
  .ring-sky:focus { outline:none; box-shadow: 0 0 0 3px rgba(2,132,199,.25); }

  /* progress bar fill animation */
  .bar-fill { transition: width .8s cubic-bezier(.2,.7,.2,1); }

  /* avoid layout flash before React mounts */
  #root:empty::before {
    content: '';
    display:block;
    height:100vh;
    background:#f8fafc;
  }

  /* RTL/LTR aware flip helpers */
  [dir="rtl"] .flip-x { transform: scaleX(-1); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/bundle.jsx"></script>
</body>
</html>
