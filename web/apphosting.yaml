# Firebase App Hosting config — runs Next.js 15 with default Cloud Run backend.
# Connect this directory to GitHub via Firebase Console → App Hosting → Add backend.
runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 5
  minInstances: 0
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-web-api-key
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: khsosy.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: khsosy
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: khsosy.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "119799379679"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:119799379679:web:35685ad446e38af3025b6a"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-LDTVR4FPHV
    availability: [BUILD, RUNTIME]

  # 5sosybot agents service (Cloud Run, project khsosy/us-east4).
  - variable: AGENTS_BASE_URL
    value: https://khsosybot-ujeiecpdja-uk.a.run.app
    availability: [RUNTIME]
  - variable: AGENTS_API_KEY
    secret: khsosybot-api-key
    availability: [RUNTIME]

  - variable: MONGODB_URI
    secret: mongodb-uri
    availability: [RUNTIME]


  - variable: DATABASE_PROVIDER
    value: mongodb
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_DATABASE_PROVIDER
    value: mongodb
    availability: [BUILD, RUNTIME]

  # Legacy 5-agent stack (orchestrator/ingestion/pedagogy/assessment/av) — still
  # falls back to simulated payloads until the production agents land.
  # When ready, set NEXT_PUBLIC_AGENTS_BASE_URL and AGENTS_SERVICE_TOKEN here.
