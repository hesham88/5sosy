# Cloud Build → Cloud Run pipeline for the agent service.
# Trigger from the GitHub repo (push to main) or run manually:
#   gcloud builds submit --config=cloudbuild.yaml
substitutions:
  _SERVICE: 5sosy-agents
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/5sosy/agents

steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}:${SHORT_SHA}', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}:${SHORT_SHA}']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --port=8080
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=true
      - --set-secrets=AGENTS_SERVICE_TOKEN=AGENTS_SERVICE_TOKEN:latest

images:
  - '${_IMAGE}:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
